name: exercise2
on: push
jobs:
 lint_build_and_test:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Install nodejs
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm ci
    - name: run lint
      run: npm run lint
    - name: run test
      run: npm test
    - name: run build
      run: npm run build