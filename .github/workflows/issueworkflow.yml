name: testingissue
on:
  issues:
    types: [opened, edited, closed]
jobs:
  issue_workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install nodejs
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: issue name
        run: echo "Issue name: ${{ github.event.issue.title }}"